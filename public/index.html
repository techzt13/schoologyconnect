<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>My Schoology Updates</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f6fa;
      color: #24292f;
      padding: 2rem 1rem;
    }

    header {
      max-width: 800px;
      margin: 0 auto 1.5rem;
    }

    header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }

    #subtitle {
      color: #57606a;
      font-size: 0.95rem;
    }

    #feed {
      max-width: 800px;
      margin: 0 auto;
    }

    .category {
      margin-bottom: 1.5rem;
    }

    .category-header {
      font-size: 1rem;
      font-weight: 700;
      color: #24292f;
      padding: 0.5rem 0.25rem;
      margin-bottom: 0.5rem;
      border-bottom: 2px solid #0969da;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .category-header .category-count {
      font-size: 0.8rem;
      font-weight: 500;
      color: #57606a;
    }

    .card {
      background: #fff;
      border: 1px solid #d0d7de;
      border-radius: 8px;
      padding: 1rem 1.25rem;
      margin-bottom: 0.75rem;
    }

    .card-course {
      color: #0969da;
      font-weight: 600;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      margin-bottom: 0.35rem;
    }

    .card-meta {
      color: #57606a;
      font-size: 0.82rem;
      margin-bottom: 0.6rem;
    }

    .card-body {
      font-size: 0.95rem;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .card-original {
      margin-top: 0.6rem;
      font-size: 0.85rem;
    }

    .card-original summary {
      color: #57606a;
      cursor: pointer;
      user-select: none;
    }

    .card-original .original-body {
      margin-top: 0.4rem;
      padding-top: 0.5rem;
      border-top: 1px solid #eaeef2;
      color: #57606a;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .ai-badge {
      display: inline-block;
      background: #ddf4ff;
      color: #0969da;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 0.1rem 0.4rem;
      border-radius: 4px;
      margin-left: 0.4rem;
      vertical-align: middle;
    }

    .loading {
      color: #57606a;
      font-style: italic;
    }

    .error-msg {
      background: #fff8f8;
      border: 1px solid #f85149;
      border-radius: 8px;
      padding: 1rem 1.25rem;
      color: #cf222e;
    }
  </style>
</head>
<body>
  <header>
    <h1>My Schoology Updates</h1>
    <p id="subtitle">Loading…</p>
  </header>

  <main id="feed">
    <p class="loading">Loading…</p>
  </main>

  <script>
    fetch('/api/updates')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var subtitle = document.getElementById('subtitle');
        var feed = document.getElementById('feed');

        // Show error if the API returned one
        if (data.error) {
          subtitle.textContent = '';
          feed.innerHTML = '<div class="error-msg">Error: ' + escapeHtml(data.error) + '</div>';
          return;
        }

        // Display the logged-in user's name
        var whoami = 'Logged in as ' + escapeHtml(data.me.name);
        if (data.ai && data.ai.enabled) {
          whoami += ' &middot; updates cleaned up by ' + escapeHtml(data.ai.model);
        }
        subtitle.innerHTML = whoami;

        if (!data.feed || data.feed.length === 0) {
          feed.innerHTML = '<p class="loading">No updates found.</p>';
          return;
        }

        // Render updates grouped by course ("category") so the feed isn't
        // one long mixed list. Categories are sorted by most-recent update.
        var groups = new Map();
        data.feed.forEach(function(u) {
          var key = u.course_title || 'Other';
          if (!groups.has(key)) groups.set(key, []);
          groups.get(key).push(u);
        });

        var categories = Array.from(groups.entries()).sort(function(a, b) {
          return b[1][0].created - a[1][0].created;
        });

        feed.innerHTML = categories.map(function(entry) {
          var title = entry[0];
          var updates = entry[1];
          var cards = updates.map(function(u) {
            var dateStr = new Date(u.created * 1000).toLocaleString();
            var comments = u.num_comments
              ? ' &middot; <span aria-label="comments">&#128172;</span> ' + u.num_comments
              : '';
            var hasSummary = Boolean(u.summary);
            var bodyHtml = escapeHtml(hasSummary ? u.summary : (u.body || ''));
            var badge = hasSummary ? '<span class="ai-badge">AI</span>' : '';
            var original = hasSummary && u.body
              ? '<details class="card-original">' +
                  '<summary>Show original</summary>' +
                  '<div class="original-body">' + escapeHtml(u.body) + '</div>' +
                '</details>'
              : '';
            return '<div class="card">' +
              '<div class="card-meta">' +
                escapeHtml(u.display_name || '') + ' &middot; ' + escapeHtml(dateStr) + comments + badge +
              '</div>' +
              '<div class="card-body">' + bodyHtml + '</div>' +
              original +
              '</div>';
          }).join('');
          return '<section class="category">' +
            '<div class="category-header">' +
              '<span>' + escapeHtml(title) + '</span>' +
              '<span class="category-count">' + updates.length +
                (updates.length === 1 ? ' update' : ' updates') + '</span>' +
            '</div>' +
            cards +
          '</section>';
        }).join('');
      })
      .catch(function(err) {
        document.getElementById('subtitle').textContent = '';
        document.getElementById('feed').innerHTML =
          '<div class="error-msg">Failed to load updates: ' + escapeHtml(err.message) + '</div>';
      });

    /** Escape HTML special characters to prevent XSS. */
    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }
  </script>
</body>
</html>
